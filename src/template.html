<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends Kebab</title>
  </head>
  <body>
    <svg
      viewBox="0 0 200 200"
      xmlns="http://www.w3.org/2000/svg"
      id="svg-noise"
    >
      <filter id="noiseFilter">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="6"
          numOctaves="3"
          stitchTiles="stitch"
        />
      </filter>

      <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>
    <header class="header">
      <nav class="header__nav">
        <button class="nav__btn" id="home-page">Home</button>
        <button class="nav__btn" id="menu-page">Menu</button>
        <button class="nav__btn" id="about-page">About</button>
      </nav>
    </header>
    <div id="content">
      <div class="menu__content">
        <div class="menu__title">
          <h1>Try out our</h1>
          <span>Specials</span>
        </div>
        <div class="menu__dishes">
          <div class="menu__item">
            <img
              src="./assets/images/kebab-small1.webp"
              alt="Gemuse Kebab"
              class="item__image"
              width="250px"
            />
            <h2 class="item__name">Chicken Doner Kebab in Pita</h2>
            <h3 class="item__pricing">9.89$</h3>
          </div>
          <div class="menu__item">
            <img
              src="./assets/images/kebab-small2.webp"
              alt="Gemuse Kebab"
              class="item__image"
              width="250px"
            />
            <h2 class="item__name">Beef/Lamb Doner Wrap</h2>
            <h3 class="item__pricing">10.99$</h3>
          </div>
          <div class="menu__item">
            <img
              src="./assets/images/kebab-small3.webp"
              alt="Gemuse Kebab"
              class="item__image"
              width="250px"
            />
            <h2 class="item__name">Mixed Meat Doner in Pita</h2>
            <h3 class="item__pricing">11.49$</h3>
          </div>
          <div class="menu__item">
            <img
              src="./assets/images/kebab-small4.webp"
              alt="Gemuse Kebab"
              class="item__image"
              width="250px"
            />
            <h2 class="item__name">Beef Shawarma-Style Wrap</h2>
            <h3 class="item__pricing">7.99$</h3>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
