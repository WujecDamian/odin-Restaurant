<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends Kebab</title>
  <script defer src="main.js"></script></head>
  <body>
    <svg
      viewBox="0 0 200 200"
      xmlns="http://www.w3.org/2000/svg"
      id="svg-noise"
    >
      <filter id="noiseFilter">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="6"
          numOctaves="3"
          stitchTiles="stitch"
        />
      </filter>

      <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>
    <header class="header">
      <nav class="header__nav">
        <button class="nav__btn" id="home-page">Home</button>
        <button class="nav__btn" id="menu-page">Menu</button>
        <button class="nav__btn" id="about-page">About</button>
      </nav>
    </header>
    <div id="content"></div>
  </body>
</html>
