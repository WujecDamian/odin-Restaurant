<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends Kebab</title>
  </head>
  <body>
    <svg
      viewBox="0 0 200 200"
      xmlns="http://www.w3.org/2000/svg"
      id="svg-noise"
    >
      <filter id="noiseFilter">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="6"
          numOctaves="3"
          stitchTiles="stitch"
        />
      </filter>

      <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>
    <header class="header">
      <nav class="header__nav">
        <button class="nav__btn">Home</button>
        <button class="nav__btn">Menu</button>
        <button class="nav__btn">About</button>
      </nav>
    </header>
    <div id="content">
      <div class="logo--wrapper">
        <div class="logo">
          <div class="logo--top">THE NOTORIOUS</div>
          <div class="logo--main">Friends Kebab</div>
          <div class="logo--bottom">All the way from Instanbul</div>
        </div>
        <div class="kebab">
          <img
            src="./assets/images/kebab-big.png"
            alt="image of juicy, tasty kebab"
            class="kebab__image"
            width="550px"
          />
        </div>
      </div>
      <div class="images__wrapper">
        <img
          src="./assets/images/kebab-small1.jpg"
          alt="Picture of tasty kebab - friends kebab"
          class="images__item"
          width="100px"
        />
        <img
          src="./assets/images/kebab-small2.jpg"
          alt="Picture of tasty kebab - friends kebab"
          class="images__item"
          width="100px"
        />
        <img
          src="./assets/images/kebab-small3.jpg"
          alt="Picture of tasty kebab - friends kebab"
          class="images__item"
          width="100px"
        />
        <img
          src="./assets/images/kebab-small4.jpg"
          alt="Picture of tasty kebab - friends kebab"
          class="images__item"
          width="100px"
        />
      </div>
    </div>
  </body>
</html>
